// ── SVG SPARKLINE ─────────────────────────────────────────────────────────────
function Sparkline({data,color="#4338ca",height=36,width=120}){
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-min)/range)*(height-4)-2}`).join(" ");
  const area=`M ${pts.split(" ")[0]} L ${pts.split(" ").join(" L ")} L ${width},${height} L 0,${height} Z`;
  return <svg width={width} height={height} style={{display:"block"}}>
    <defs><linearGradient id={`sg${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
      <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
    </linearGradient></defs>
    <path d={area} fill={`url(#sg${color.replace("#","")})`}/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
  </svg>;
}

// ── SVG BAR CHART (history durations) ─────────────────────────────────────────
function DurationBarChart({data,slaDeadlineSec}){
  const W=560,H=120,PAD={t:10,r:20,b:28,l:44};
  const innerW=W-PAD.l-PAD.r,innerH=H-PAD.t-PAD.b;
  const valid=data.filter(d=>d.duration);
  const maxDur=Math.max(...valid.map(d=>d.duration),slaDeadlineSec||0)*1.1||10000;
  const barW=innerW/data.length*0.6;
  const gap=innerW/data.length;
  const slaY=slaDeadlineSec?innerH-(slaDeadlineSec/maxDur)*innerH:null;
  const fmtY=s=>{if(s<3600)return`${Math.floor(s/60)}m`;return`${Math.floor(s/3600)}h${Math.floor((s%3600)/60)}m`;};
  const labels=[0,maxDur/2,maxDur].map(v=>({v,y:innerH-(v/maxDur)*innerH}));
  return <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
    {labels.map((l,i)=><g key={i}>
      <line x1={PAD.l} y1={PAD.t+l.y} x2={PAD.l+innerW} y2={PAD.t+l.y} stroke="#f1f5f9" strokeWidth="1"/>
      <text x={PAD.l-6} y={PAD.t+l.y+4} textAnchor="end" fontSize="9" fill="#94a3b8">{fmtY(l.v)}</text>
    </g>)}
    {slaY!==null&&<g>
      <line x1={PAD.l} y1={PAD.t+slaY} x2={PAD.l+innerW} y2={PAD.t+slaY} stroke="#dc2626" strokeWidth="1" strokeDasharray="4 3"/>
      <text x={PAD.l+innerW+4} y={PAD.t+slaY+4} fontSize="8" fill="#dc2626">SLA</text>
    </g>}
    {data.map((d,i)=>{
      const x=PAD.l+i*gap+(gap-barW)/2;
      const barH=d.duration?(d.duration/maxDur)*innerH:0;
      const y=PAD.t+innerH-barH;
      const color=d.slaStatus==="BREACHED"?"#dc2626":d.slaStatus==="AT_RISK"?"#d97706":d.status==="FAILED"?"#ef4444":d.status==="RUNNING"?"#d97706":"#16a34a";
      const short=d.date.slice(5);
      return <g key={i}>
        {d.duration&&<rect x={x} y={y} width={barW} height={barH} rx="2" fill={color} opacity={0.85}/>}
        {d.status==="RUNNING"&&<rect x={x} y={PAD.t+innerH-20} width={barW} height={20} rx="2" fill="#d97706" opacity={0.4}/>}
        {d.status==="FAILED"&&!d.duration&&<rect x={x} y={PAD.t+innerH-12} width={barW} height={12} rx="2" fill="#dc2626" opacity={0.6}/>}
        <text x={x+barW/2} y={H-6} textAnchor="middle" fontSize="8" fill="#94a3b8">{short}</text>
      </g>;
    })}
  </svg>;
}

// ── DAG FLOW ──────────────────────────────────────────────────────────────────
function DagFlowView({steps,onSelectStep,selectedStep}){
  const levels={};
  const assignLevel=(id,vis=new Set())=>{if(levels[id]!==undefined)return levels[id];if(vis.has(id))return 0;vis.add(id);const step=steps.find(s=>s.stepId===id);if(!step||step.depends.length===0){levels[id]=0;return 0;}const mx=Math.max(...step.depends.map(d=>assignLevel(d,new Set(vis))));levels[id]=mx+1;return levels[id];};
  steps.forEach(s=>assignLevel(s.stepId));
  const maxLevel=Math.max(0,...Object.values(levels));
  const cols=Array.from({length:maxLevel+1},(_,i)=>steps.filter(s=>levels[s.stepId]===i));
  const NW=155,NH=72,CG=60,RG=10;
  const maxColH=Math.max(...cols.map(col=>col.length*NH+Math.max(0,col.length-1)*RG));
  const np={};
  cols.forEach((col,ci)=>{const colH=col.length*NH+Math.max(0,col.length-1)*RG;const off=(maxColH-colH)/2;col.forEach((step,ri)=>{np[step.stepId]={x:ci*(NW+CG),y:off+ri*(NH+RG)};});});
  const totalW=(maxLevel+1)*(NW+CG)-CG+4;
  const edges=[];
  steps.forEach(step=>{step.depends.forEach(dep=>{const f=np[dep],t=np[step.stepId];if(f&&t){const x1=f.x+NW,y1=f.y+NH/2,x2=t.x,y2=t.y+NH/2,mx=(x1+x2)/2;const c=SC[step.status]||SC.PENDING;edges.push({x1,y1,x2,y2,mx,color:c.color,pending:step.status==="PENDING"});}});});
  return <div style={{overflowX:"auto",paddingBottom:4}}>
    <div style={{position:"relative",width:totalW,height:maxColH+4,minHeight:100}}>
      <svg style={{position:"absolute",inset:0,width:totalW,height:maxColH+4,overflow:"visible",pointerEvents:"none"}}>
        {edges.map((e,i)=><path key={i} d={`M ${e.x1} ${e.y1} C ${e.mx} ${e.y1}, ${e.mx} ${e.y2}, ${e.x2} ${e.y2}`} fill="none" stroke={e.color} strokeWidth={1.5} strokeOpacity={e.pending?0.2:0.45} strokeDasharray={e.pending?"5 3":"none"}/>)}
      </svg>
      {steps.map(step=>{
        const pos=np[step.stepId]; if(!pos)return null;
        const cfg=SC[step.status]||SC.PENDING;
        const isSel=selectedStep?.stepId===step.stepId;
        return <div key={step.stepId} onClick={()=>onSelectStep(isSel?null:step)} style={{position:"absolute",left:pos.x,top:pos.y,width:NW,height:NH,background:isSel?"#eff6ff":"#fff",border:`1.5px solid ${isSel?"#3b82f6":cfg.border}`,borderRadius:8,padding:"9px 11px",cursor:"pointer",boxSizing:"border-box",transition:"all .15s",boxShadow:isSel?"0 0 0 3px rgba(59,130,246,0.15)":step.status==="FAILED"?"0 0 0 2px rgba(220,38,38,0.12)":"0 1px 3px rgba(15,23,42,0.06)"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#0f172a",marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{step.name}</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <ExecChip executor={step.executor}/><StatusChip status={step.status} small/>
          </div>
          {step.status==="RUNNING"&&<div style={{marginTop:5,height:2,background:"#e2e8f0",borderRadius:1,overflow:"hidden"}}><div style={{height:"100%",width:"35%",background:"#d97706",animation:"progress-slide 1.8s ease-in-out infinite"}}/></div>}
          {step.status==="SUCCEEDED"&&step.durationSeconds&&<div style={{marginTop:3,fontSize:9,color:"#94a3b8",fontFamily:"'DM Mono',monospace"}}>✓ {fmtDur(step.durationSeconds)}</div>}
          {step.status==="FAILED"&&<div style={{marginTop:3,fontSize:9,color:"#dc2626",fontFamily:"'DM Mono',monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>✗ {step.errorCode||"FAILED"}</div>}
        </div>;
      })}
    </div>
  </div>;
}

// ── STEP DETAIL PANEL ─────────────────────────────────────────────────────────
function StepDetailPanel({step,onClose,role,env,allSteps}){
  const [tab,setTab]=useState("details");
  const [confirm,setConfirm]=useState(null);
  const [done,setDone]=useState(null);
  const write=canWrite(role,env);
  const isProd=env==="PROD";
  const hasDQ=step.dqResults&&step.dqResults.length>0;

  // Downstream impact: find all steps that (transitively) depend on this step
  const getDownstream=(stepId,steps)=>{
    const result=[];
    const visit=id=>{steps.forEach(s=>{if(s.depends.includes(id)&&!result.find(r=>r.stepId===s.stepId)){result.push(s);visit(s.stepId);}});};
    visit(stepId);return result;
  };
  const downstream=getDownstream(step.stepId,allSteps||[]);
  const blockedReports=REPORTS.filter(r=>r.pipeline&&downstream.some(d=>d.stepId===r.step)||step.stepId===r.step);

  const doAction=action=>{if(confirm===action){setDone(action);setConfirm(null);setTimeout(()=>setDone(null),3000);}else{setConfirm(action);setTimeout(()=>setConfirm(null),3500);}};

  const rows=[
    {l:"Step ID",v:step.stepId},{l:"Job ID",v:step.jobId||"—"},
    {l:"Executor",v:<ExecChip executor={step.executor}/>},
    {l:"Status",v:<StatusChip status={step.status}/>},
    {l:"Start",v:step.startTime||"—"},{l:"End",v:step.endTime||"—"},
    {l:"Duration",v:fmtDur(step.durationSeconds)},
    {l:"Retries",v:step.retryAttempts??0},
    {l:"Row Count",v:fmtRows(step.rowCount)},{l:"Bytes Out",v:fmtBytes(step.bytesWritten)},
    {l:"Depends On",v:step.depends.length?step.depends.join(", "):"None (root)"},
  ];

  const tabs=[{k:"details",l:"Details"},{k:"downstream",l:`Impact (${downstream.length})`},{...(hasDQ?{k:"dq",l:"DQ Results"}:{})},{...((role==="L3"||role==="PROD_SUPPORT")?{k:"log",l:"Log"}:{})}].filter(t=>t.k);

  return <div className="slide-right" style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:10,padding:"16px",boxShadow:"0 4px 16px rgba(15,23,42,0.08)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
      <div><div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{step.name}</div><div style={{fontSize:9,color:"#94a3b8",fontFamily:"'DM Mono',monospace",marginTop:2}}>{step.stepId}</div></div>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:16,color:"#94a3b8",padding:"0 2px"}}>✕</button>
    </div>

    {step.status==="FAILED"&&step.errorMsg&&<div style={{background:"#fff1f2",border:"1px solid #fecaca",borderRadius:6,padding:"8px 10px",marginBottom:10}}>
      <div style={{fontSize:10,fontWeight:700,color:"#dc2626",fontFamily:"'DM Mono',monospace",marginBottom:2}}>{step.errorCode}</div>
      <div style={{fontSize:11,color:"#991b1b",lineHeight:1.5}}>{step.errorMsg}</div>
    </div>}

    {/* Tabs */}
    <div style={{display:"flex",gap:1,background:"#f1f5f9",borderRadius:6,padding:2,marginBottom:12}}>
      {tabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,padding:"4px 0",borderRadius:4,fontSize:10,fontWeight:700,border:"none",background:tab===t.k?"#fff":"transparent",color:tab===t.k?"#0f172a":"#94a3b8",boxShadow:tab===t.k?"0 1px 2px rgba(15,23,42,0.06)":"none"}}>{t.l}</button>)}
    </div>

    {tab==="details"&&<>
      <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:12}}>
        {rows.map(r=><div key={r.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#f8fafc",borderRadius:4,gap:8}}>
          <span style={{fontSize:10,color:"#64748b",whiteSpace:"nowrap"}}>{r.l}</span>
          <span style={{fontSize:10,color:"#0f172a",fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{r.v}</span>
        </div>)}
      </div>
      {/* Actions */}
      {role==="PROD_SUPPORT"&&<>
        <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,letterSpacing:"0.1em",marginBottom:6}}>ACTIONS</div>
        {done?<div style={{padding:"7px 12px",borderRadius:6,background:"#f0fdf4",border:"1px solid #bbf7d0",fontSize:11,fontWeight:600,color:"#16a34a"}}>✓ {done==="kill"?"Kill signal sent":"Retry submitted"}</div>:(
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>doAction("kill")} style={{flex:1,padding:"7px 0",borderRadius:6,fontSize:11,fontWeight:700,background:confirm==="kill"?"#dc2626":"#fff",border:`1.5px solid ${confirm==="kill"?"#dc2626":"#fecaca"}`,color:confirm==="kill"?"#fff":"#dc2626"}}>{confirm==="kill"?"Confirm Kill?":"Force Kill"}</button>
            <button onClick={()=>doAction("retry")} style={{flex:1,padding:"7px 0",borderRadius:6,fontSize:11,fontWeight:700,background:confirm==="retry"?"#d97706":"#fff",border:`1.5px solid ${confirm==="retry"?"#d97706":"#fde68a"}`,color:confirm==="retry"?"#fff":"#d97706"}}>{confirm==="retry"?"Confirm Retry?":"Retry Step"}</button>
          </div>
        )}
      </>}
      {role==="L3"&&<>
        <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,letterSpacing:"0.1em",marginBottom:6}}>ACTIONS</div>
        {isProd?<div style={{padding:"8px 12px",borderRadius:6,background:"#fff1f2",border:"1px solid #fecaca",fontSize:11,color:"#991b1b",display:"flex",alignItems:"center",gap:7}}>🔒 Write disabled in PROD for L3. Contact Prod Support.</div>
        :done?<div style={{padding:"7px 12px",borderRadius:6,background:"#f0fdf4",border:"1px solid #bbf7d0",fontSize:11,fontWeight:600,color:"#16a34a"}}>✓ {done==="kill"?"Kill sent":"Retry submitted"}</div>
        :<div style={{display:"flex",gap:6}}>
          <button onClick={()=>doAction("kill")} style={{flex:1,padding:"7px 0",borderRadius:6,fontSize:11,fontWeight:700,background:confirm==="kill"?"#dc2626":"#fff",border:`1.5px solid ${confirm==="kill"?"#dc2626":"#fecaca"}`,color:confirm==="kill"?"#fff":"#dc2626"}}>{confirm==="kill"?"Confirm?":"Force Kill"}</button>
          <button onClick={()=>doAction("retry")} style={{flex:1,padding:"7px 0",borderRadius:6,fontSize:11,fontWeight:700,background:confirm==="retry"?"#d97706":"#fff",border:`1.5px solid ${confirm==="retry"?"#d97706":"#fde68a"}`,color:confirm==="retry"?"#fff":"#d97706"}}>{confirm==="retry"?"Confirm?":"Retry Step"}</button>
        </div>}
      </>}
    </>}

    {tab==="downstream"&&<div>
      {downstream.length===0?<div style={{textAlign:"center",padding:"20px",color:"#94a3b8",fontSize:12}}>No downstream steps depend on this step.</div>:<>
        {step.status==="FAILED"&&<div style={{background:"#fff1f2",border:"1px solid #fecaca",borderRadius:6,padding:"8px 10px",marginBottom:10,fontSize:11,color:"#991b1b"}}>
          ⚠ This step has FAILED. {downstream.length} downstream step{downstream.length>1?"s":""} are blocked.
        </div>}
        <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
          {downstream.map((s,i)=>{
            const cfg=SC[s.status]||SC.PENDING;
            return <div key={s.stepId} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:"#f8fafc",borderRadius:5,border:`1px solid ${cfg.border}`}}>
              <div><div style={{fontSize:11,fontWeight:600,color:"#0f172a"}}>{s.name}</div><ExecChip executor={s.executor}/></div>
              <StatusChip status={s.status} small/>
            </div>;
          })}
        </div>
        {blockedReports.length>0&&<>
          <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,letterSpacing:"0.1em",marginBottom:7}}>BLOCKED REPORTS</div>
          {blockedReports.map(r=><div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:5,marginBottom:4}}>
            <span style={{fontSize:11,color:"#92400e",fontWeight:500}}>{r.name}</span>
            <RptChip status={r.status}/>
          </div>)}
        </>}
      </>}
    </div>}

    {tab==="dq"&&hasDQ&&<div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>DQ rules evaluated on this step's output</div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {step.dqResults.map((r,i)=>{
          const pass=r.result==="PASS";
          return <div key={i} style={{padding:"8px 10px",background:pass?"#f0fdf4":"#fff1f2",border:`1px solid ${pass?"#bbf7d0":"#fecaca"}`,borderRadius:6}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace",color:pass?"#16a34a":"#dc2626"}}>{r.rule}</span>
              <span style={{fontSize:10,fontWeight:700,color:pass?"#16a34a":"#dc2626"}}>{r.result}</span>
            </div>
            <div style={{display:"flex",gap:16,fontSize:10,color:"#64748b"}}>
              <span>Rows: {r.rowsChecked.toLocaleString()}</span>
              <span>Failed: {r.rowsFailed.toLocaleString()}</span>
              <span>Threshold: {r.threshold}</span>
              <span style={{color:pass?"#16a34a":"#dc2626",fontWeight:600}}>Actual: {r.actual}</span>
            </div>
          </div>;
        })}
      </div>
    </div>}

    {tab==="log"&&<div>
      <div style={{background:"#0f172a",borderRadius:6,padding:"10px 11px",fontFamily:"'DM Mono',monospace",fontSize:10,lineHeight:1.9,maxHeight:200,overflowY:"auto"}}>
        {step.status==="FAILED"?(<><span style={{color:"#4ade80"}}>[{step.startTime}] → {step.executor} {step.jobId}</span><br/><span style={{color:"#94a3b8"}}>[+00:32] RUNNING</span><br/><span style={{color:"#fbbf24"}}>[+02:00] Timeout warning</span><br/><span style={{color:"#f87171"}}>[+03:00] Retry 1/3</span><br/><span style={{color:"#f87171"}}>[+05:00] Retry 2/3 → ECONNREFUSED</span><br/><span style={{color:"#f87171"}}>[+07:00] Retry 3/3 → ECONNREFUSED</span><br/><span style={{color:"#f87171"}}>[+07:01] FAILED — max retries exceeded</span></>)
        :step.status==="RUNNING"?(<><span style={{color:"#4ade80"}}>[{step.startTime}] → {step.executor}</span><br/><span style={{color:"#94a3b8"}}>[+00:31] RUNNING</span><br/><span style={{color:"#fbbf24",animation:"pulse-dot 1.4s ease-in-out infinite"}}>[+00:46] 41% ···</span></>)
        :(<><span style={{color:"#4ade80"}}>[{step.startTime}] → {step.executor}</span><br/><span style={{color:"#94a3b8"}}>[+00:16] RUNNING</span><br/><span style={{color:"#4ade80"}}>[{step.endTime}] SUCCEEDED · {fmtRows(step.rowCount)} rows</span></>)}
      </div>
    </div>}
  </div>;
}

// ── REPORTS TAB ───────────────────────────────────────────────────────────────
function ReportsTab({followed,onToggle,alertPrefs,onAlertToggle}){
  const [catFilter,setCatFilter]=useState("All");
  const [showAll,setShowAll]=useState(followed.size===0);
  const cats=["All",...Array.from(new Set(REPORTS.map(r=>r.category)))];
  const pipMap={}; PIPELINES.forEach(p=>pipMap[p.id]=p);
  const visible=REPORTS.filter(r=>{if(catFilter!=="All"&&r.category!==catFilter)return false;if(!showAll&&followed.size>0)return followed.has(r.id);return true;});

  return <div style={{padding:"20px 24px",overflowY:"auto",flex:1,maxWidth:960}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div><div style={{fontSize:16,fontWeight:700,color:"#0f172a"}}>Reports</div><div style={{fontSize:12,color:"#64748b",marginTop:2}}>{followed.size>0?`${followed.size} followed · `:"All "}{REPORTS.length} reports</div></div>
      <button onClick={()=>setShowAll(v=>!v)} style={{padding:"6px 14px",borderRadius:7,fontSize:12,fontWeight:600,background:showAll?"#0f172a":"#fff",color:showAll?"#fff":"#0f172a",border:"1.5px solid "+(showAll?"#0f172a":"#e2e8f0")}}>
        {showAll?"★ My Reports":"⊞ All Reports"}
      </button>
    </div>
    {followed.size===0&&!showAll&&<div style={{background:"#f8fafc",border:"2px dashed #e2e8f0",borderRadius:10,padding:"32px 24px",textAlign:"center",marginBottom:18}}>
      <div style={{fontSize:28,marginBottom:10}}>📋</div>
      <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:5}}>No followed reports yet</div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>Follow reports to track the outputs you care about.</div>
      <button onClick={()=>setShowAll(true)} style={{padding:"8px 20px",borderRadius:7,background:"#4338ca",color:"#fff",border:"none",fontSize:13,fontWeight:600}}>Browse All Reports</button>
    </div>}
    <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
      {cats.map(c=><button key={c} onClick={()=>setCatFilter(c)} style={{padding:"4px 12px",borderRadius:6,border:`1.5px solid ${catFilter===c?"#4338ca":"#e2e8f0"}`,background:catFilter===c?"#eff6ff":"#fff",color:catFilter===c?"#4338ca":"#64748b",fontSize:11,fontWeight:600}}>{c}</button>)}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {visible.map(r=>{
        const pip=pipMap[r.pipeline];
        const isFol=followed.has(r.id);
        const hasAlert=alertPrefs.has(r.id);
        return <div key={r.id} style={{background:"#fff",border:`1.5px solid ${isFol?"#c7d2fe":"#e2e8f0"}`,borderRadius:9,padding:"14px 16px",boxShadow:isFol?"0 0 0 3px rgba(67,56,202,0.06)":"0 1px 3px rgba(15,23,42,0.04)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5,flexWrap:"wrap"}}>
                <span style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{r.name}</span>
                <span style={{fontSize:9,color:"#94a3b8",background:"#f1f5f9",padding:"1px 6px",borderRadius:3,fontFamily:"'DM Mono',monospace"}}>{r.category}</span>
                <RptChip status={r.status}/>
              </div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:9,lineHeight:1.5}}>{r.description}</div>
              <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:"#94a3b8"}}>📦 <span style={{color:"#475569",fontFamily:"'DM Mono',monospace",fontSize:9}}>{r.pipeline.split(".").pop()}</span></span>
                <span style={{fontSize:10,color:"#94a3b8"}}>⤷ <span style={{color:"#475569",fontFamily:"'DM Mono',monospace",fontSize:9}}>{r.step}</span></span>
                {pip&&<div style={{display:"flex",gap:5,alignItems:"center"}}><StatusChip status={pip.lastRun.status} small/><SlaChip status={pip.slaStatus}/></div>}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
              <button onClick={()=>onToggle(r.id)} style={{padding:"5px 11px",borderRadius:6,fontSize:11,fontWeight:700,background:isFol?"#4338ca":"#f8fafc",color:isFol?"#fff":"#64748b",border:`1.5px solid ${isFol?"#4338ca":"#e2e8f0"}`}}>{isFol?"★ Following":"☆ Follow"}</button>
              {isFol&&<button onClick={()=>onAlertToggle(r.id)} style={{padding:"5px 11px",borderRadius:6,fontSize:10,fontWeight:600,background:hasAlert?"#fffbeb":"#f8fafc",color:hasAlert?"#d97706":"#94a3b8",border:`1px solid ${hasAlert?"#fde68a":"#e2e8f0"}`}}>{hasAlert?"🔔 Alerts ON":"🔕 Alerts"}</button>}
            </div>
          </div>
          {pip&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:"#94a3b8"}}>Pipeline</span>
            <div style={{flex:1,minWidth:80}}><StepBar steps={pip.steps}/></div>
            <span style={{fontSize:10,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{pip.steps.complete}/{Object.values(pip.steps).reduce((a,b)=>a+b,0)} steps</span>
            <span style={{fontSize:10,color:"#94a3b8"}}>SLA {pip.slaDeadline}</span>
            {pip.estimatedCompletion&&<span style={{fontSize:10,color:"#64748b"}}>Est. {pip.estimatedCompletion}</span>}
          </div>}
        </div>;
      })}
      {visible.length===0&&<div style={{textAlign:"center",padding:"32px",color:"#94a3b8",fontSize:13}}>No reports match current filter.</div>}
    </div>
  </div>;
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const TABS=[
  {k:"overview",    l:"Overview"},
  {k:"pipelines",   l:"Pipelines"},
  {k:"reports",     l:"Reports"},
  {k:"infra",       l:"Infrastructure"},
  {k:"history",     l:"History"},
  {k:"incidents",   l:"Incidents"},
];

function App(){
  const [env,setEnv]=useState("PROD");
  const [role,setRole]=useState("PROD_SUPPORT");
  const [tab,setTab]=useState("overview");
  const [clock,setClock]=useState(nowStr());
  const [followed,setFollowed]=useState(new Set(["rpt.ftp.daily_interest","rpt.ftp.transfer_pricing","rpt.ftp.funds_cost"]));
  const [alertPrefs,setAlertPrefs]=useState(new Set(["rpt.ftp.daily_interest"]));
  const [triggerPip,setTriggerPip]=useState(null);

  useEffect(()=>{const t=setInterval(()=>setClock(nowStr()),1000);return()=>clearInterval(t);},[]);
  const toggleFollow=id=>setFollowed(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleAlert =id=>setAlertPrefs(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});

  const ec=ENVS[env];
  const write=canWrite(role,env);
  const openP1=INCIDENTS.filter(i=>i.status!=="RESOLVED"&&i.severity==="P1").length;
  const incBadge=INCIDENTS.filter(i=>i.status!=="RESOLVED").length;

  return <div style={{fontFamily:"'DM Sans',sans-serif",background:"#f1f5f9",minHeight:"100vh",display:"flex",flexDirection:"column",height:"100vh"}}>

    {/* ENV BANNER */}
    <div style={{background:ec.bg,borderBottom:`2px solid ${ec.border}`,padding:"5px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span style={{fontSize:11,fontWeight:800,letterSpacing:"0.1em",color:ec.color,fontFamily:"'DM Mono',monospace",background:"white",padding:"2px 8px",borderRadius:3,border:`1px solid ${ec.border}`}}>{env}</span>
        <span style={{fontSize:11,color:ec.color}}>{ec.text}</span>
        {openP1>0&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700,background:"#fff1f2",padding:"1px 7px",borderRadius:3,border:"1px solid #fecaca"}}>🔴 {openP1} P1 incident active</span>}
        {env==="PROD"&&role==="L3"&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700}}>⚠ L3: read-only in PROD</span>}
        {env==="PROD"&&role==="PROD_SUPPORT"&&<span style={{fontSize:10,color:"#16a34a",fontWeight:600}}>✓ Prod Support: write access</span>}
      </div>
      <div style={{display:"flex",gap:4}}>
        {Object.entries(ENVS).map(([key,cfg])=><button key={key} onClick={()=>setEnv(key)} style={{padding:"2px 9px",borderRadius:4,fontSize:10,fontWeight:800,letterSpacing:"0.07em",fontFamily:"'DM Mono',monospace",background:env===key?cfg.color:"transparent",color:env===key?"#fff":cfg.color,border:`1.5px solid ${env===key?cfg.color:cfg.border}`}}>{key}</button>)}
      </div>
    </div>

    {/* NAV */}
    <div style={{borderBottom:"1px solid #e2e8f0",background:"#fff",padding:"0 22px",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 4px rgba(15,23,42,0.05)",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#4338ca 0%,#7c3aed 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:"#fff",flexShrink:0}}>Q</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#0f172a",letterSpacing:"-0.01em"}}>QRM Orchestration Monitor</div>
              <div style={{fontSize:9,color:"#94a3b8",fontFamily:"'DM Mono',monospace",letterSpacing:"0.08em"}}>TREASURY TECHNOLOGY</div>
            </div>
          </div>
          <div style={{width:1,height:28,background:"#e2e8f0"}}/>
          <div style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>BIZ DATE <span style={{color:"#0f172a"}}>2026-04-14</span></div>
          <div style={{display:"flex",gap:1}}>
            {TABS.map(({k,l})=>{
              const badge=k==="reports"&&followed.size>0?followed.size:k==="incidents"&&incBadge>0?incBadge:null;
              return <button key={k} onClick={()=>setTab(k)} style={{padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:600,background:tab===k?"#f1f5f9":"transparent",color:tab===k?"#0f172a":"#64748b",border:"none",position:"relative"}}>
                {l}{badge&&<span style={{marginLeft:4,background:k==="incidents"?"#dc2626":"#4338ca",color:"#fff",borderRadius:10,fontSize:9,fontWeight:700,padding:"1px 5px"}}>{badge}</span>}
              </button>;
            })}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",background:"#f1f5f9",borderRadius:7,padding:2,gap:1}}>
            {[{k:"BUSINESS",l:"Business"},{k:"PROD_SUPPORT",l:"Prod Support"},{k:"L3",l:"L3"}].map(r=>(
              <button key={r.k} onClick={()=>setRole(r.k)} style={{padding:"4px 11px",borderRadius:5,border:"none",fontSize:11,fontWeight:600,background:role===r.k?"#fff":"transparent",color:role===r.k?"#0f172a":"#94a3b8",boxShadow:role===r.k?"0 1px 3px rgba(15,23,42,0.08)":"none"}}>{r.l}</button>
            ))}
          </div>
          {role!=="BUSINESS"&&<div style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600,background:write?"#f0fdf4":"#fff1f2",color:write?"#16a34a":"#dc2626",border:`1px solid ${write?"#bbf7d0":"#fecaca"}`}}>{write?"🔓 R+W":"🔒 RO"}</div>}
          <div style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:"#64748b",padding:"3px 9px",border:"1px solid #e2e8f0",borderRadius:5,background:"#f8fafc"}}>{clock}</div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:"#16a34a",animation:"pulse-dot 2s ease-in-out infinite",display:"inline-block"}}/>
            <span style={{fontSize:10,color:"#64748b"}}>LIVE</span>
          </div>
        </div>
      </div>
    </div>

    {/* TRIGGER MODAL (global) */}
    {triggerPip&&<TriggerModal pipeline={triggerPip} env={env} onClose={()=>setTriggerPip(null)} onConfirm={()=>{}}/>}

    {/* BODY */}
    <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
      {tab==="overview"   &&<OverviewTab   role={role} env={env} onTrigger={setTriggerPip}/>}
      {tab==="pipelines"  &&<PipelinesTab  role={role} env={env} followed={followed}/>}
      {tab==="reports"    &&<ReportsTab    followed={followed} onToggle={toggleFollow} alertPrefs={alertPrefs} onAlertToggle={toggleAlert}/>}
      {tab==="infra"      &&<InfraTab/>}
      {tab==="history"    &&<HistoryTab/>}
      {tab==="incidents"  &&<IncidentsTab  role={role} env={env}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
