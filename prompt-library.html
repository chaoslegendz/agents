<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt Library — Treasury Technology</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --td-green:  #54B848;
    --td-dark:   #003F2D;
    --td-bg:     #edf6eb;
    --surface:   #ffffff;
    --surface2:  #f4faf3;
    --border:    #c8e4c4;
    --border2:   #aed4a9;
    --bsa:   #54B848; --bsa-dim: #54B84814;
    --dev:   #2563EB; --dev-dim: #2563EB14;
    --qa:    #EA580C; --qa-dim:  #EA580C14;
    --prod:  #7C3AED; --prod-dim:#7C3AED14;
    --text:       #0d2b22;
    --text-muted: #3d6355;
    --text-dim:   #8aaa9a;
    --shadow: 0 1px 3px rgba(0,63,45,0.06), 0 4px 12px rgba(0,63,45,0.04);
    --shadow-md: 0 2px 8px rgba(0,63,45,0.08), 0 8px 24px rgba(0,63,45,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--td-bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header { background: var(--td-dark); padding: 20px 32px 18px; box-shadow: 0 2px 12px rgba(0,63,45,0.3); }
  .header-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: rgba(255,255,255,0.45); margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .header-eyebrow .tag { background: var(--td-green); color: var(--td-dark); padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .header h1 span { font-weight: 300; font-size: 14px; color: rgba(255,255,255,0.45); margin-left: 10px; }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 73px); }

  /* SIDEBAR */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: sticky; top: 0; height: calc(100vh - 73px);
    overflow-y: auto;
  }
  .sidebar-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em; color: var(--text-dim); margin-bottom: 10px; padding-left: 8px; }
  .role-tab {
    width: 100%; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    margin-bottom: 4px; text-align: left;
    transition: all 0.15s;
  }
  .role-tab:hover { background: var(--surface2); }
  .role-tab.active { background: var(--surface2); }
  .role-tab .rtab-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .role-tab .rtab-name { font-size: 13px; font-weight: 600; }
  .role-tab .rtab-sub { font-size: 11px; color: var(--text-dim); }
  .role-tab .rtab-count { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); }

  .sidebar-divider { height: 1px; background: var(--border); margin: 16px 0; }

  .prompt-nav { display: flex; flex-direction: column; gap: 2px; }
  .prompt-nav-item {
    width: 100%; background: none; border: none; cursor: pointer;
    text-align: left; padding: 7px 10px; border-radius: 6px;
    font-size: 12px; color: var(--text-muted); line-height: 1.4;
    transition: all 0.1s; display: flex; align-items: center; gap: 8px;
  }
  .prompt-nav-item:hover { background: var(--surface2); color: var(--text); }
  .prompt-nav-item.active { font-weight: 600; }
  .prompt-nav-item .pn-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); min-width: 18px; }

  /* MAIN */
  .main { flex: 1; padding: 32px; max-width: 860px; }

  /* ROLE HEADER */
  .role-header-bar {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 24px;
  }
  .role-badge-large {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 14px; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600;
    border: 1px solid; margin-bottom: 10px;
  }
  .role-title-large { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .role-tools { font-size: 12px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .role-principle {
    font-size: 12px; color: var(--text-muted); font-style: italic;
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid; border-radius: 6px; padding: 10px 14px;
    max-width: 340px; line-height: 1.5;
  }

  /* PROMPT CARD */
  .prompt-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 20px;
    box-shadow: var(--shadow); overflow: hidden;
    scroll-margin-top: 24px;
    transition: box-shadow 0.2s;
  }
  .prompt-card:hover { box-shadow: var(--shadow-md); }
  .prompt-card-header {
    padding: 18px 20px 0; display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px;
  }
  .prompt-num {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--text-dim); padding-top: 3px; flex-shrink: 0;
  }
  .prompt-title { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }
  .prompt-type-chip {
    font-family: 'DM Mono', monospace; font-size: 9px;
    padding: 3px 8px; border-radius: 4px; border: 1px solid;
    white-space: nowrap; flex-shrink: 0; font-weight: 500;
  }
  .prompt-meta { padding: 10px 20px 14px; display: flex; gap: 20px; flex-wrap: wrap; }
  .prompt-meta-item { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }
  .prompt-meta-item strong { color: var(--text-muted); font-weight: 500; }
  .prompt-when {
    margin: 0 20px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px;
    font-size: 12px; color: var(--text-muted); line-height: 1.5;
  }
  .prompt-when span { font-weight: 600; color: var(--text); }
  .prompt-body { padding: 0 20px; }
  .prompt-code-wrap { position: relative; margin-bottom: 14px; }
  .prompt-code {
    background: var(--td-dark); border-radius: 8px;
    padding: 16px 18px; font-family: 'DM Mono', monospace;
    font-size: 11px; line-height: 1.8; color: rgba(255,255,255,0.75);
    white-space: pre-wrap; word-break: break-word;
    max-height: 380px; overflow-y: auto;
  }
  .prompt-code .ph { color: var(--td-green); } /* placeholders */
  .copy-btn {
    position: absolute; top: 10px; right: 10px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7); border-radius: 6px;
    padding: 5px 12px; font-family: 'DM Mono', monospace; font-size: 10px;
    cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { background: rgba(84,184,72,0.3); border-color: var(--td-green); color: #fff; }
  .copy-btn.copied { background: rgba(84,184,72,0.4); border-color: var(--td-green); color: #fff; }
  .prompt-footer {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--surface2);
  }
  .prompt-footer-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 5px; }
  .prompt-footer-text { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  /* SEARCH */
  .search-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px; box-shadow: var(--shadow);
  }
  .search-bar input {
    border: none; outline: none; background: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text); flex: 1;
  }
  .search-bar input::placeholder { color: var(--text-dim); }
  .search-icon { color: var(--text-dim); font-size: 14px; }
  .search-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); }

  .no-results { text-align: center; padding: 40px; color: var(--text-dim); font-size: 13px; }

  .footer { background: var(--td-dark); padding: 14px 32px; display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.35); }
  .footer .accent { color: var(--td-green); }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow"><span class="tag">Treasury Technology</span><span>Shared Prompt Library · prompts/</span></div>
  <h1>AI Prompt Library <span>v1.0 · 2026</span></h1>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-label">ROLES</div>
    <button class="role-tab active" onclick="setRole('bsa')">
      <div class="rtab-dot" style="background:var(--bsa)"></div>
      <div><div class="rtab-name">BSA</div><div class="rtab-sub">Business Systems Analyst</div></div>
      <div class="rtab-count">10</div>
    </button>
    <button class="role-tab" onclick="setRole('dev')">
      <div class="rtab-dot" style="background:var(--dev)"></div>
      <div><div class="rtab-name">Dev</div><div class="rtab-sub">Developer</div></div>
      <div class="rtab-count">10</div>
    </button>
    <button class="role-tab" onclick="setRole('qa')">
      <div class="rtab-dot" style="background:var(--qa)"></div>
      <div><div class="rtab-name">QA / QE</div><div class="rtab-sub">QA Engineer</div></div>
      <div class="rtab-count">8</div>
    </button>
    <button class="role-tab" onclick="setRole('prod')">
      <div class="rtab-dot" style="background:var(--prod)"></div>
      <div><div class="rtab-name">Prod Support</div><div class="rtab-sub">Production Support</div></div>
      <div class="rtab-count">7</div>
    </button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-label">PROMPTS</div>
    <div class="prompt-nav" id="prompt-nav"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search prompts..." oninput="filterPrompts()">
      <span class="search-count" id="search-count"></span>
    </div>
    <div id="role-header"></div>
    <div id="prompts-container"></div>
  </main>
</div>

<footer class="footer">
  <span>Treasury Technology · AI Prompt Library · prompts/</span>
  <span class="accent">Repo: agent-infrastructure/prompts/</span>
</footer>

<script>
const ROLES = {
  bsa: {
    name: 'Business Systems Analyst',
    abbr: 'BSA',
    color: '#54B848',
    dim: '#54B84814',
    tools: 'M365 Copilot (primary) · GitHub Copilot · BSA Agent',
    principle: 'Agents assist — you own the requirements and test cases.',
    prompts: [
      {
        title: 'Convert Meeting Notes to Requirements',
        type: 'Requirements',
        tool: 'BSA Agent',
        when: 'After a stakeholder meeting, discovery session, or requirements workshop.',
        good: 'Numbered REQ-### IDs, no ambiguous language, at least 2–3 open questions surfaced, assumptions made explicit.',
        prompt: `You are a senior business systems analyst at a financial institution.

Convert the following meeting notes into a structured requirements document.

Meeting notes:
[PASTE MEETING NOTES HERE]

Jira ticket: [JIRA-####]

Output format:
- Ticket ID: JIRA-####
- Summary: One sentence describing the feature or change
- Background: Why this is needed (2–3 sentences)
- Functional Requirements: Numbered list, REQ-001 format, each requirement on one line, written as "The system shall..."
- Assumptions: What you've assumed that wasn't explicitly stated
- Open Questions: Anything that needs clarification before work begins
- Out of Scope: What this ticket explicitly does not cover

Be specific. Avoid vague language. If a requirement is unclear, flag it as an open question rather than inventing detail.`
      },
      {
        title: 'Convert Email Thread to Requirements',
        type: 'Requirements',
        tool: 'BSA Agent',
        when: 'When requirements come in via email rather than a meeting.',
        good: 'Conflicts surfaced, not resolved. All implied requirements made explicit with an assumption flag.',
        prompt: `You are a senior business systems analyst at a financial institution.

I have an email thread below that contains a business request. Extract the key requirements from it and produce a structured requirements document.

Email thread:
[PASTE EMAIL THREAD HERE]

Jira ticket: [JIRA-####]

Output:
- Ticket ID: JIRA-####
- Summary: One sentence
- Requester & stakeholders: Who is asking and who is affected
- Functional Requirements: REQ-001 numbered format, "The system shall..." statements
- Assumptions: What you've inferred that wasn't stated
- Open Questions: What needs clarification before work can begin
- Out of Scope: What this ticket does not cover

Flag any conflicting information in the email thread. Do not resolve conflicts — surface them as open questions.`
      },
      {
        title: 'Self-Review Requirements for Completeness',
        type: 'Quality check',
        tool: 'BSA Agent',
        when: 'Before handing requirements to the Plan agent. Run this after you\'ve drafted requirements.',
        good: 'At least 3–5 gaps on a typical ticket. If zero gaps are returned, re-prompt with more specific context.',
        prompt: `You are a senior QA analyst reviewing a requirements document before it goes to development.

Review the following requirements document and identify gaps, ambiguities, and missing elements.

Requirements document:
[PASTE REQUIREMENTS HERE]

Check for:
1. Missing acceptance criteria — are there requirements with no clear pass/fail condition?
2. Ambiguous language — words like "fast," "easy," "flexible" with no measurable definition
3. Missing error/edge cases — what happens when input is invalid, empty, or unexpected?
4. Missing negative cases — what should the system NOT do?
5. Missing non-functional requirements — performance, security, data retention, audit logging
6. Regulatory gaps — OSFI, Basel III, or data lineage considerations not addressed
7. Testability — can each requirement be verified by a test case?

Output per gap:
- Gap: [description]
- Severity: High / Medium / Low
- Suggested fix or clarifying question

Do not rewrite the requirements. Only flag issues.`
      },
      {
        title: 'Map Regulatory Text to Functional Requirements',
        type: 'Regulatory',
        tool: 'BSA Agent',
        when: 'When a ticket is driven by an OSFI guideline, Basel III rule, or internal policy.',
        good: 'Direct traceability from each REQ-### to a specific regulatory clause. Ambiguities flagged, not guessed.',
        prompt: `You are a senior business systems analyst specialising in regulatory compliance at a Canadian bank.

Map the following regulatory text to functional system requirements.

Regulatory source: [e.g. OSFI B-13, Basel III BCBS 239, SA-CCR guideline section X]
Regulatory text:
[PASTE REGULATORY SECTION HERE]

Business context:
[Brief description of the system or process this applies to]

For each requirement you derive:
- REQ-###: The system shall... [functional requirement]
- Regulatory reference: [exact clause or section]
- Rationale: Why this requirement is needed to satisfy the regulation
- Audit note: What evidence would demonstrate compliance

Flag any regulatory text that is ambiguous or requires legal/compliance team interpretation.`
      },
      {
        title: 'Generate Acceptance Criteria from Vague Business Language',
        type: 'Requirements',
        tool: 'BSA Agent',
        when: 'When a stakeholder gives you a vague ask and you need to turn it into testable AC.',
        good: 'Each AC is independently testable. Negative cases included. Missing info clearly listed.',
        prompt: `A business stakeholder has given me the following request:

"[PASTE VAGUE BUSINESS REQUEST]"

Jira ticket: [JIRA-####]

Convert this into specific, testable acceptance criteria using Given-When-Then format.

For each acceptance criterion:
- AC-###: Given [context], When [action], Then [expected outcome]
- Test type: Positive / Negative / Edge case
- Notes: Any assumption made to write this AC

Also list:
- What information is still missing to write complete acceptance criteria
- What you assumed versus what was stated

Do not pad. If the request only supports 3 AC, write 3. Quality over quantity.`
      },
      {
        title: 'Generate BSA Test Cases from Requirements',
        type: 'Test cases',
        tool: 'BSA Agent',
        when: 'After requirements are finalised and self-reviewed. Produces the BSA testplan for the Jira ticket.',
        good: 'Every REQ-### covered. Negative cases present. MANUAL_REQUIRED flagged where automation isn\'t possible.',
        prompt: `You are a senior business systems analyst writing functional test cases.

Generate a test plan from the following requirements document.

Requirements:
[PASTE REQUIREMENTS HERE]

Jira ticket: [JIRA-####]

For each test case:
- ID: JIRA-####-TC01 (increment per case)
- Title: Short description of what is being tested
- Type: Functional / Negative / Edge case / Boundary
- Prerequisite: What must be true before this test can run
- Steps: Numbered test steps
- Expected result: What should happen
- Automation: automated / manual / tbd
- Notes: Any dependency or clarification

Rules:
- Every REQ-### must have at least one test case
- Include at least one negative test case per functional area
- Flag any requirement that cannot be tested as written — do not write a test case for it`
      },
      {
        title: 'Self-Review Test Plan for Coverage Gaps',
        type: 'Quality check',
        tool: 'BSA Agent',
        when: 'After generating BSA test cases, before handing to the Plan agent.',
        good: 'A clear coverage matrix. Any REQ-### with "Not covered" must be addressed before handoff.',
        prompt: `Review the following test plan against the requirements document and identify coverage gaps.

Requirements:
[PASTE REQUIREMENTS]

Test plan:
[PASTE TEST PLAN]

Check for:
1. Requirements without any test case
2. Requirements with only positive tests (missing negative/edge cases)
3. Test cases that don't map to any requirement
4. Duplicate or redundant test cases
5. Test cases that are not independently executable
6. Cases marked "tbd" for automation that could realistically be automated

Output a coverage report:
- Requirement: [REQ-###]
- Coverage status: Covered / Partially covered / Not covered
- Gap: What is missing
- Recommendation: Add TC / Modify TC / Flag as manual

Summary line: X of Y requirements fully covered.`
      },
      {
        title: 'Draft Stakeholder Update for Requirements Change',
        type: 'Communication',
        tool: 'M365 Copilot',
        when: 'When requirements change mid-sprint and you need to communicate the impact.',
        good: 'Clear summary of what changed and why, impact stated plainly, one clear ask.',
        prompt: `Draft a concise stakeholder update email for the following requirements change.

Jira ticket: [JIRA-####]
Original requirement: [DESCRIBE ORIGINAL]
New requirement: [DESCRIBE CHANGE]
Reason for change: [EXPLAIN WHY]
Impact: [WHAT CHANGES — scope, timeline, test cases]
Action required from stakeholders: [WHAT DO YOU NEED FROM THEM]

Tone: Professional, direct, no fluff.
Audience: [business stakeholders / technology leads]
Length: Under 150 words.`
      },
      {
        title: 'Summarise Requirements for Dev Handoff',
        type: 'Handoff',
        tool: 'BSA Agent',
        when: 'When handing a complex ticket to the Plan agent — a summary helps the agent produce a better plan.',
        good: 'Concise enough to read in 2 minutes. Key business rules clearly stated. Dependencies explicit.',
        prompt: `Summarise the following requirements document into a structured handoff brief for a development team.

Requirements:
[PASTE REQUIREMENTS]

Test plan:
[PASTE TEST PLAN]

Jira ticket: [JIRA-####]

Output:
- What is being built (2 sentences max)
- Key business rules the developer must not violate
- The 3 most critical test cases from the test plan
- Known constraints or dependencies (systems, data, environments)
- Open questions that dev may surface during implementation

This brief will be fed to a planning agent. Be precise. No padding.`
      },
      {
        title: 'Check for Overlap with Existing Jira Tickets',
        type: 'Discovery',
        tool: 'M365 Copilot',
        when: 'Before writing new requirements, to avoid duplicating work already done or in flight.',
        good: 'Specific search terms relevant to the domain, not generic. JQL queries ready to paste.',
        prompt: `I am about to write requirements for the following request:

[DESCRIBE THE REQUEST]

Before I start, help me draft a list of search terms and Jira JQL queries I should run to check whether similar work has already been done or is in progress.

Context: We work in treasury technology at a bank. Our systems include [LIST RELEVANT SYSTEMS e.g. Murex, ADLS, reporting pipelines].

Output:
- 5 search terms to use in Jira text search
- 3 JQL queries to find potentially related tickets
- Questions I should ask my team before starting`
      },
    ]
  },
  dev: {
    name: 'Developer',
    abbr: 'Dev',
    color: '#2563EB',
    dim: '#2563EB14',
    tools: 'GitHub Copilot in VS Code (Claude + GPT) · Plan Agent · Dev Agent (FE / Python) · Code Review Agent',
    principle: 'Agents assist — you own the code. Always review output before committing.',
    prompts: [
      { title:'Feed Requirements to the Plan Agent', type:'Planning', tool:'Plan Agent', when:'At the start of a Standard-tier ticket, after the BSA has finalised requirements and test cases.', good:'Every TC-### from the BSA testplan explicitly mapped. Risks named. Steps specific enough that a dev agent can execute them.', prompt:`@plan-agent

Create an implementation plan for the following Jira ticket.

Jira ticket: [JIRA-####]

Requirements:
[PASTE REQUIREMENTS]

BSA Test Plan:
[PASTE JIRA-####-testplan-bsa]

[If applicable:]
Architecture reference: [PASTE relevant section of architecture.md]
Security controls: [PASTE relevant section of security-controls.md]

Output a structured plan with:
1. Summary — what is being built and why
2. Technical approach — how it will be implemented
3. Components affected — files, services, APIs, databases
4. Implementation steps — ordered, numbered, specific
5. Test case mapping — for each JIRA-####-TC## how the implementation satisfies it
6. Risks and dependencies — what could block or complicate this
7. Definition of done — what must be true for this ticket to be complete

Flag anything in the requirements that is ambiguous before proceeding.` },
      { title:'Feed Plan to the Frontend Dev Agent', type:'Implementation', tool:'Dev Agent — Frontend', when:'After the plan agent has produced the implementation plan and it has been human-reviewed.', good:'Every TC-### has a test. Manifest includes status for all cases. No silent skips.', prompt:`@dev-agent-frontend

Implement the following plan for Jira ticket [JIRA-####].

Implementation plan:
[PASTE JIRA-####-plan]

BSA Test plan:
[PASTE JIRA-####-testplan-bsa]

Rules:
- Follow the patterns in copilot-instructions.md for this repo
- For each JIRA-####-TC## in the BSA test plan, generate a corresponding unit or component test
- After implementation, emit JIRA-####-test-results-manifest.json with result of each TC-## case: PASS, FAIL, MANUAL_REQUIRED, or SKIPPED with reason
- Do not add scope beyond what is in the plan without flagging it
- Flag any plan step that is ambiguous before implementing it

Output:
- Implementation code
- Unit/component tests mapped to TC-## IDs
- test-results-manifest.json` },
      { title:'Feed Plan to the Python Dev Agent', type:'Implementation', tool:'Dev Agent — Python', when:'For Python/backend work after the plan agent has produced the implementation plan.', good:'Type hints on all functions. No mypy or ruff violations. Every TC-### has a corresponding pytest test.', prompt:`@dev-agent-python

Implement the following plan for Jira ticket [JIRA-####].

Implementation plan:
[PASTE JIRA-####-plan]

BSA Test plan:
[PASTE JIRA-####-testplan-bsa]

Rules:
- Follow Python standards: ruff for linting, mypy for type checking, bandit for security
- Use Pydantic for config/data validation where applicable
- Follow YAML config patterns for any pipeline configuration
- For each JIRA-####-TC## in the BSA test plan, generate a corresponding pytest unit test
- After implementation, emit JIRA-####-test-results-manifest.json with status for each TC-## case
- Do not add scope beyond the plan without flagging it

Output:
- Python implementation
- pytest tests mapped to TC-## IDs
- test-results-manifest.json` },
      { title:'Set Repo Context for Copilot Inline', type:'Setup', tool:'copilot-instructions.md', when:'When starting work on a new repo or unfamiliar codebase — paste into copilot-instructions.md.', good:'Copilot suggestions align to your stack without having to repeat context on every prompt.', prompt:`# Copilot Instructions — [REPO NAME]

## What this repo does
[2–3 sentences describing the purpose of this repo]

## Tech stack
- Language: Python [version] / TypeScript [version]
- Framework: [e.g. FastAPI, React]

let currentRole = 'bsa';
let searchQuery = '';

function setRole(role) {
  currentRole = role;
  searchQuery = '';
  document.getElementById('search').value = '';
  document.querySelectorAll('.role-tab').forEach((t, i) => {
    t.classList.toggle('active', Object.keys(ROLES)[i] === role);
  });
  renderAll();
  window.scrollTo(0, 0);
}

function filterPrompts() {
  searchQuery = document.getElementById('search').value.toLowerCase();
  renderPrompts();
}

function renderAll() {
  renderRoleHeader();
  renderNav();
  renderPrompts();
}

function renderRoleHeader() {
  const r = ROLES[currentRole];
  document.getElementById('role-header').innerHTML = `
    <div class="role-header-bar">
      <div>
        <div class="role-badge-large" style="color:${r.color};border-color:${r.color};background:${r.dim}">
          <span style="width:10px;height:10px;border-radius:50%;background:${r.color};display:inline-block;flex-shrink:0"></span>
          ${r.abbr}
        </div>
        <div class="role-title-large">${r.name}</div>
        <div class="role-tools">${r.tools}</div>
      </div>
      <div class="role-principle" style="border-left-color:${r.color}">
        ${r.principle}
      </div>
    </div>`;
}

function renderNav() {
  const r = ROLES[currentRole];
  document.getElementById('prompt-nav').innerHTML = r.prompts.map((p, i) => `
    <button class="prompt-nav-item" onclick="scrollToPrompt(${i})" style="--role-color:${r.color}">
      <span class="pn-num">${String(i+1).padStart(2,'0')}</span>
      <span>${p.title}</span>
    </button>`).join('');
}

function scrollToPrompt(i) {
  const el = document.getElementById(`prompt-${i}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

    'Gap analysis': { bg: '#EA580C14', border: '#EA580C', color: '#EA580C' },
    'Regression': { bg: '#2563EB14', border: '#2563EB', color: '#2563EB' },
    'Verification': { bg: '#54B84814', border: '#54B848', color: '#54B848' },
    'Automation': { bg: '#7C3AED14', border: '#7C3AED', color: '#7C3AED' },
    'Sign-off': { bg: '#003F2D14', border: '#003F2D', color: '#003F2D' },
    'Incident': { bg: '#dc262614', border: '#dc2626', color: '#dc2626' },
    'Runbook': { bg: '#7C3AED14', border: '#7C3AED', color: '#7C3AED' },
    'Playbook': { bg: '#2563EB14', border: '#2563EB', color: '#2563EB' },
    'Review': { bg: '#54B84814', border: '#54B848', color: '#54B848' },
    'Monitoring': { bg: '#003F2D14', border: '#003F2D', color: '#003F2D' },
  };
  return map[type] || { bg: '#54B84814', border: '#54B848', color: '#54B848' };
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightPlaceholders(str) {
  return escapeHtml(str).replace(/\[([^\]]+)\]/g, '<span class="ph">[$1]</span>');
}

function renderPrompts() {
  const r = ROLES[currentRole];
  const filtered = r.prompts.filter((p, i) => {
    if (!searchQuery) return true;
    return p.title.toLowerCase().includes(searchQuery) ||
           p.type.toLowerCase().includes(searchQuery) ||
           p.tool.toLowerCase().includes(searchQuery) ||
           p.when.toLowerCase().includes(searchQuery) ||
           p.prompt.toLowerCase().includes(searchQuery);
  });

  document.getElementById('search-count').textContent = searchQuery
    ? `${filtered.length} of ${r.prompts.length} prompts`
    : `${r.prompts.length} prompts`;

  if (filtered.length === 0) {
    document.getElementById('prompts-container').innerHTML = `<div class="no-results">No prompts match "${searchQuery}"</div>`;
    return;
  }

  document.getElementById('prompts-container').innerHTML = filtered.map((p, i) => {
    const tc = typeColors(p.type);
    const globalIdx = r.prompts.indexOf(p);
    return `
    <div class="prompt-card" id="prompt-${globalIdx}">
      <div class="prompt-card-header">
        <span class="prompt-num">${String(globalIdx+1).padStart(2,'0')}</span>
        <span class="prompt-title">${p.title}</span>
        <span class="prompt-type-chip" style="background:${tc.bg};border-color:${tc.border};color:${tc.color}">${p.type}</span>
      </div>
      <div class="prompt-meta">
        <div class="prompt-meta-item"><strong>Tool:</strong> ${p.tool}</div>
      </div>
      <div class="prompt-when"><span>When to use:</span> ${p.when}</div>
      <div class="prompt-body">
        <div class="prompt-code-wrap">
          <pre class="prompt-code">${highlightPlaceholders(p.prompt)}</pre>
          <button class="copy-btn" onclick="copyPrompt(this, ${globalIdx})">Copy</button>
        </div>
      </div>
      <div class="prompt-footer">
        <div class="prompt-footer-label">✓ WHAT GOOD OUTPUT LOOKS LIKE</div>
        <div class="prompt-footer-text">${p.good}</div>
      </div>
    </div>`;
  }).join('');
}

function copyPrompt(btn, idx) {
  const r = ROLES[currentRole];
  navigator.clipboard.writeText(r.prompts[idx].prompt).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// Init
renderAll();
</script>
</body>
</html>
