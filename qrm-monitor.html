      to   { opacity: 1; transform: translateY(0); }
    }

    const fmtDuration = s => {
      if (!s && s !== 0) return "—";
      if (s < 60) return `${s}s`;
      if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
      return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
    };
    const fmtBytes = b => {
      if (!b) return "—";
      if (b < 1048576)    return `${(b/1024).toFixed(1)} KB`;
      if (b < 1073741824) return `${(b/1048576).toFixed(1)} MB`;
      return `${(b/1073741824).toFixed(2)} GB`;
    };
    const fmtRows = n => {
      if (!n) return "—";
      return n >= 1e6 ? `${(n/1e6).toFixed(2)}M` : n >= 1000 ? `${(n/1000).toFixed(1)}K` : String(n);
    };
    const nowStr = () => new Date().toLocaleTimeString("en-CA", { hour12: false });

          color: cfg.color, background: cfg.bg,
          border: `1px solid ${cfg.color}33`, whiteSpace: "nowrap",
        }}>

            animation: cfg.pulse ? "pulse-dot 1.4s ease-in-out infinite" : "none",
          }} />
          {cfg.label}
        </span>

    }

        }}>{cfg.label}</span>
      );
    }

    function StepBar({ steps }) {
      const total = steps.complete + steps.running + steps.pending + steps.failed;
      if (!total) return null;
      return (
        <div style={{ display: "flex", gap: 1, height: 4, width: "100%", borderRadius: 2, overflow: "hidden" }}>

          {steps.complete > 0 && <div style={{ flex: steps.complete, background: "#22c55e" }} />}
          {steps.running  > 0 && <div style={{ flex: steps.running,  background: "#f59e0b", animation: "shimmer 1.5s ease-in-out infinite" }} />}
          {steps.pending  > 0 && <div style={{ flex: steps.pending,  background: "#1e293b" }} />}
        </div>
      );
    }

        }}>

            <div style={{ flex: 1, minWidth: 0, paddingRight: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#f1f5f9", marginBottom: 3,
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {pipeline.name}
              </div>
              <div style={{ fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace",
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {pipeline.id}
              </div>
            </div>
            <StatusBadge status={pipeline.lastRun.status} small />
          </div>

          <StepBar steps={pipeline.steps} />

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 9 }}>
            <div style={{ display: "flex", gap: 7, alignItems: "center" }}>
              <SlaBadge status={pipeline.slaStatus} />
              {pipeline.slaStatus === "ON_TRACK" && pipeline.bufferMinutes > 0 &&
                <span style={{ fontSize: 10, color: "#64748b" }}>+{pipeline.bufferMinutes}m</span>}
              {pipeline.slaStatus === "BREACHED" &&

    // ── DAG FLOW VIEW ─────────────────────────────────────────────────────────

    function DagFlowView({ steps, onSelectStep, selectedStep }) {
      const levels = {};
      const assignLevel = (id, visited = new Set()) => {
        if (levels[id] !== undefined) return levels[id];
        if (visited.has(id)) return 0;
        visited.add(id);
        const step = steps.find(s => s.stepId === id);
        if (!step || step.depends.length === 0) { levels[id] = 0; return 0; }
        const max = Math.max(...step.depends.map(d => assignLevel(d, new Set(visited))));
        levels[id] = max + 1;
        return levels[id];
      };
      steps.forEach(s => assignLevel(s.stepId));

      const maxLevel = Math.max(0, ...Object.values(levels));
      const cols = Array.from({ length: maxLevel + 1 }, (_, i) =>
        steps.filter(s => levels[s.stepId] === i)
      );

      const NODE_W = 152, NODE_H = 70, COL_GAP = 60, ROW_GAP = 12;
      const nodePos = {};

      const maxColH = Math.max(...cols.map(col =>
        col.length * NODE_H + Math.max(0, col.length - 1) * ROW_GAP
      ));

      cols.forEach((col, ci) => {
        const colH = col.length * NODE_H + Math.max(0, col.length - 1) * ROW_GAP;
        const offset = (maxColH - colH) / 2;
        col.forEach((step, ri) => {
          nodePos[step.stepId] = {
            x: ci * (NODE_W + COL_GAP),
            y: offset + ri * (NODE_H + ROW_GAP),
          };
        });
      });

      const totalW = (maxLevel + 1) * (NODE_W + COL_GAP) - COL_GAP + 2;
      const totalH = maxColH + 2;

      const edges = [];
      steps.forEach(step => {
        step.depends.forEach(dep => {
          const from = nodePos[dep];
          const to = nodePos[step.stepId];
          if (from && to) {
            const x1 = from.x + NODE_W, y1 = from.y + NODE_H / 2;
            const x2 = to.x,            y2 = to.y  + NODE_H / 2;
            const mx = (x1 + x2) / 2;
            const cfg = STATUS_CFG[step.status] || STATUS_CFG.PENDING;
            edges.push({ dep, id: step.stepId, x1, y1, x2, y2, mx, color: cfg.color, pending: step.status === "PENDING" });
          }
        });
      });

      return (
        <div style={{ overflowX: "auto", paddingBottom: 4 }}>
          <div style={{ position: "relative", width: totalW, height: totalH, minHeight: 100 }}>
            <svg style={{ position: "absolute", inset: 0, width: totalW, height: totalH, overflow: "visible", pointerEvents: "none" }}>
              <defs>
                <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                  <path d="M0,0 L0,6 L6,3 z" fill="#475569" />
                </marker>
              </defs>
              {edges.map((e, i) => (
                <path key={i}
                  d={`M ${e.x1} ${e.y1} C ${e.mx} ${e.y1}, ${e.mx} ${e.y2}, ${e.x2} ${e.y2}`}
                  fill="none" stroke={e.color} strokeWidth={1.5}
                  strokeOpacity={e.pending ? 0.2 : 0.4}
                  strokeDasharray={e.pending ? "5 3" : "none"}
                  markerEnd="url(#arr)"
                />
              ))}
            </svg>

            {steps.map(step => {
              const pos = nodePos[step.stepId];
              if (!pos) return null;
              const cfg = STATUS_CFG[step.status] || STATUS_CFG.PENDING;
              const ecfg = EXEC_CFG[step.executor] || {};
              const isSel = selectedStep?.stepId === step.stepId;
              return (
                <div key={step.stepId} onClick={() => onSelectStep(isSel ? null : step)} style={{
                  position: "absolute", left: pos.x, top: pos.y,
                  width: NODE_W, height: NODE_H,
                  background: isSel ? "rgba(99,102,241,0.18)" : "#0b1422",
                  border: isSel ? "1.5px solid #6366f1" : `1.5px solid ${cfg.color}44`,
                  borderRadius: 6, padding: "9px 11px", cursor: "pointer",
                  boxSizing: "border-box", transition: "all 0.15s",
                  boxShadow: isSel ? "0 0 16px rgba(99,102,241,0.3)" : step.status === "FAILED" ? "0 0 12px rgba(239,68,68,0.2)" : "none",
                }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#e2e8f0", marginBottom: 6,
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {step.name}
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <ExecBadge executor={step.executor} />
                    <StatusBadge status={step.status} small />
                  </div>
                  {step.status === "RUNNING" && (
                    <div style={{ marginTop: 6, height: 2, background: "#1e293b", borderRadius: 1, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: "35%", background: "#f59e0b",
                        animation: "progress-slide 1.8s ease-in-out infinite" }} />
                    </div>
                  )}
                  {step.status === "SUCCEEDED" && step.durationSeconds && (
                    <div style={{ marginTop: 4, fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
                      ✓ {fmtDuration(step.durationSeconds)}
                    </div>
                  )}
                  {step.status === "FAILED" && (
                    <div style={{ marginTop: 4, fontSize: 9, color: "#ef4444", fontFamily: "'JetBrains Mono', monospace",
                      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      ✗ {step.errorCode || "FAILED"}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

                  SLA SUMMARY · EOD BATCH
                </div>
                <SlaSummaryStrip pipelines={PIPELINES} />
              </div>

              <div style={{ height: 1, background: "rgba(248,250,252,0.06)" }} />

              <div>
                <div style={{ fontSize: 9, color: "#475569", letterSpacing: "0.12em", fontWeight: 700, marginBottom: 7 }}>
                  PIPELINES · {PIPELINES.length} ACTIVE
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {PIPELINES.map(p => (
                    <PipelineCard key={p.id} pipeline={p}
                      selected={selectedPipeline?.id === p.id}
                      onClick={() => selectPipeline(p)} role={role} />
                  ))}
                </div>
              </div>
            </div>

            {/* ── MAIN ── */}
            <div style={{ flex: 1, padding: "18px 22px", display: "flex", flexDirection: "column", gap: 14, overflowY: "auto" }}>

              {selectedPipeline && runDetail && (
                <>
                  {/* Run header card */}
                  <div style={{
                    background: "rgba(248,250,252,0.02)", border: "1px solid rgba(248,250,252,0.08)",
                    borderRadius: 8, padding: "14px 18px",
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
                      <div>
                        <div style={{ fontSize: 17, fontWeight: 700, color: "#f1f5f9", marginBottom: 6 }}>
                          {selectedPipeline.name}
                        </div>
                        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                          <StatusBadge status={selectedPipeline.lastRun.status} />
                          <SlaBadge status={selectedPipeline.slaStatus} />
                          {role !== "BUSINESS" && (
                            <>
                              <span style={{ fontSize: 10, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
                                {runDetail.runId}
                              </span>
                              <span style={{ fontSize: 10, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
                                git:{runDetail.gitSha}
                              </span>
                            </>
                          )}
                        </div>
                      </div>

                      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                        {[
                          { label: "START",        value: selectedPipeline.lastRun.startTime },
                          { label: "SLA DEADLINE", value: selectedPipeline.slaDeadline },
                          { label: "EST COMPLETE", value: selectedPipeline.estimatedCompletion || "—" },
                          { label: "TRIGGER",      value: runDetail.triggerType },
                        ].map(({ label, value }) => (
                          <div key={label} style={{ textAlign: "center" }}>
                            <div style={{ fontSize: 9, color: "#475569", letterSpacing: "0.09em", marginBottom: 2 }}>{label}</div>
                            <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace", color: "#94a3b8" }}>{value}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div style={{ marginTop: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                        <span style={{ fontSize: 10, color: "#475569" }}>
                          {selectedPipeline.steps.complete} / {Object.values(selectedPipeline.steps).reduce((a,b) => a+b, 0)} steps complete
                        </span>
                        {selectedPipeline.slaStatus === "ON_TRACK" && selectedPipeline.bufferMinutes > 0 &&
                          <span style={{ fontSize: 10, color: "#22c55e" }}>+{selectedPipeline.bufferMinutes}m buffer</span>}
                        {selectedPipeline.slaStatus === "BREACHED" &&
                          <span style={{ fontSize: 10, color: "#ef4444" }}>SLA breached by {Math.abs(selectedPipeline.bufferMinutes)}m</span>}
                        {selectedPipeline.slaStatus === "AT_RISK" &&
                          <span style={{ fontSize: 10, color: "#f59e0b" }}>{selectedPipeline.bufferMinutes}m buffer remaining</span>}
                      </div>
                      <div style={{ height: 6, background: "#0f172a", borderRadius: 3, overflow: "hidden" }}>
                        <StepBar steps={selectedPipeline.steps} />
                      </div>
                    </div>
                  </div>

                  {/* Controls row */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                    <div style={{ display: "flex", gap: 5, alignItems: "center", flexWrap: "wrap" }}>
                      <span style={{ fontSize: 10, color: "#475569", letterSpacing: "0.07em" }}>EXECUTOR</span>
                      {[null, "QRM", "DATABRICKS", "AUTOSYS"].map(e => {
                        const ecfg = e ? EXEC_CFG[e] : null;
                        const isActive = execFilter === e;
                        return (
                          <button key={e || "ALL"} onClick={() => setExecFilter(e)} style={{
                            padding: "3px 10px", borderRadius: 4, border: "none",
                            fontSize: 10, fontWeight: 700, cursor: "pointer", letterSpacing: "0.06em",
                            background: isActive ? (ecfg ? ecfg.bg : "rgba(248,250,252,0.1)") : "rgba(248,250,252,0.03)",
                            color: isActive ? (ecfg ? ecfg.color : "#e2e8f0") : "#475569",
                            border: isActive
                              ? `1px solid ${ecfg ? ecfg.color + "55" : "rgba(248,250,252,0.2)"}`
                              : "1px solid rgba(248,250,252,0.07)",
                          }}>{e || "ALL"}</button>
                        );
                      })}
                    </div>

                    <div style={{ display: "flex", background: "rgba(248,250,252,0.04)", borderRadius: 5, padding: 2, gap: 1 }}>
                      {[["DAG", "⬡ FLOW"], ["LIST", "≡ LIST"]].map(([v, label]) => (
                        <button key={v} onClick={() => setView(v)} style={{
                          padding: "4px 12px", borderRadius: 3, border: "none",
                          fontSize: 10, fontWeight: 700, cursor: "pointer",
                          background: view === v ? "rgba(248,250,252,0.1)" : "transparent",
                          color: view === v ? "#e2e8f0" : "#475569",
                        }}>{label}</button>
                      ))}
                    </div>
                  </div>

                  {/* Main view + detail panel */}
                  <div style={{
                    display: "grid",
                    gridTemplateColumns: selectedStep ? "1fr 300px" : "1fr",
                    gap: 14, alignItems: "start",
                  }}>
                    <div style={{
                      background: "rgba(248,250,252,0.015)", border: "1px solid rgba(248,250,252,0.07)",
                      borderRadius: 8, padding: "16px 18px",
                    }}>
                      <div style={{ fontSize: 10, color: "#475569", letterSpacing: "0.1em", fontWeight: 700, marginBottom: 14 }}>
                        {view === "DAG" ? "JOB DEPENDENCY FLOW" : "STEP SEQUENCE"}
                        {execFilter && <span style={{ color: EXEC_CFG[execFilter]?.color }}> · {execFilter} ONLY</span>}
                      </div>
                      {view === "DAG"
                        ? <DagFlowView steps={filteredSteps} onSelectStep={setSelectedStep} selectedStep={selectedStep} />
                        : <StepListView steps={filteredSteps} onSelect={setSelectedStep} selected={selectedStep} role={role} />}
                    </div>

                    {selectedStep && (
                      <StepDetailPanel step={selectedStep} onClose={() => setSelectedStep(null)} role={role} />
                    )}
                  </div>

                  {/* Audit footer */}
                  {(role === "L3" || role === "PROD_SUPPORT") && (
                    <div style={{
                      background: "rgba(248,250,252,0.015)", border: "1px solid rgba(248,250,252,0.07)",
                      borderRadius: 8, padding: "10px 16px",
                      display: "flex", gap: 24, alignItems: "center", flexWrap: "wrap",
                    }}>
                      <span style={{ fontSize: 9, color: "#475569", fontWeight: 700, letterSpacing: "0.1em" }}>AUDIT</span>
                      {[
                        { label: "Triggered By", value: runDetail.triggeredBy },
                        { label: "Trigger",      value: runDetail.triggerType },
                        { label: "Git SHA",      value: runDetail.gitSha },
                        { label: "Biz Date",     value: runDetail.businessDate },
                        { label: "Run ID",       value: runDetail.runId },
                      ].map(({ label, value }) => (
                        <div key={label}>
                          <div style={{ fontSize: 9, color: "#475569", letterSpacing: "0.07em" }}>{label}</div>
                          <div style={{ fontSize: 11, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>{value}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
