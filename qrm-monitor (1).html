// ── ATOMS ─────────────────────────────────────────────────────────────────────
function Chip({ color,bg,border,label,pulse,small }) {
  return (
    <span style={{ display:"inline-flex",alignItems:"center",gap:5,
      padding:small?"2px 7px":"3px 10px", borderRadius:4,
      fontSize:small?10:11, fontWeight:600, letterSpacing:"0.04em",
      fontFamily:"'DM Mono',monospace",
      color, background:bg, border:`1px solid ${border}`,whiteSpace:"nowrap" }}>
      {pulse!==undefined&&<span style={{ width:5,height:5,borderRadius:"50%",background:color,flexShrink:0,
        animation:pulse?"pulse-dot 1.4s ease-in-out infinite":"none" }}/>}
      {label}
    </span>
  );
}
const StatusChip = ({status,small}) => { const c=S_CFG[status]||S_CFG.PENDING; return <Chip {...c} label={c.label} small={small} pulse={c.pulse}/>; };
const SlaChip    = ({status})       => { const c=SLA_CFG[status]||SLA_CFG.ON_TRACK; return <Chip {...c} small/>; };
const ExecChip   = ({executor})     => { const c=EXEC_CFG[executor]||{color:"#64748b",bg:"#f1f5f9",border:"#e2e8f0"}; return <Chip {...c} label={executor} small/>; };
const RptChip    = ({status})       => { const c=S_CFG[status]||S_CFG.PENDING; return <Chip {...c} label={c.label} small/>; };

function StepBar({ steps }) {
  const total=steps.complete+steps.running+steps.pending+steps.failed;
  if(!total)return null;
  return (
    <div style={{display:"flex",gap:1,height:5,borderRadius:3,overflow:"hidden",background:"#e2e8f0"}}>
      {steps.failed>0   && <div style={{flex:steps.failed,   background:"#dc2626"}}/>}
      {steps.complete>0 && <div style={{flex:steps.complete, background:"#16a34a"}}/>}
      {steps.running>0  && <div style={{flex:steps.running,  background:"#d97706",animation:"shimmer-bar 1.5s ease-in-out infinite"}}/>}
      {steps.pending>0  && <div style={{flex:steps.pending,  background:"#e2e8f0"}}/>}
    </div>
  );
}

// ── DAG FLOW ──────────────────────────────────────────────────────────────────
function DagFlowView({ steps, onSelectStep, selectedStep }) {
  const levels={};
  const assignLevel=(id,vis=new Set())=>{
    if(levels[id]!==undefined)return levels[id];
    if(vis.has(id))return 0; vis.add(id);
    const step=steps.find(s=>s.stepId===id);
    if(!step||step.depends.length===0){levels[id]=0;return 0;}
    const mx=Math.max(...step.depends.map(d=>assignLevel(d,new Set(vis))));
    levels[id]=mx+1;return levels[id];
  };
  steps.forEach(s=>assignLevel(s.stepId));
  const maxLevel=Math.max(0,...Object.values(levels));
  const cols=Array.from({length:maxLevel+1},(_,i)=>steps.filter(s=>levels[s.stepId]===i));
  const NW=155,NH=72,CG=60,RG=10;
  const maxColH=Math.max(...cols.map(col=>col.length*NH+Math.max(0,col.length-1)*RG));
  const np={};
  cols.forEach((col,ci)=>{
    const colH=col.length*NH+Math.max(0,col.length-1)*RG;
    const off=(maxColH-colH)/2;
    col.forEach((step,ri)=>{np[step.stepId]={x:ci*(NW+CG),y:off+ri*(NH+RG)};});
  });
  const totalW=(maxLevel+1)*(NW+CG)-CG+4;
  const edges=[];
  steps.forEach(step=>{
    step.depends.forEach(dep=>{
      const f=np[dep],t=np[step.stepId];
      if(f&&t){const x1=f.x+NW,y1=f.y+NH/2,x2=t.x,y2=t.y+NH/2,mx=(x1+x2)/2;
        const c=S_CFG[step.status]||S_CFG.PENDING;
        edges.push({x1,y1,x2,y2,mx,color:c.color,pending:step.status==="PENDING"});}
    });
  });
  return (
    <div style={{overflowX:"auto",paddingBottom:4}}>
      <div style={{position:"relative",width:totalW,height:maxColH+4,minHeight:100}}>
        <svg style={{position:"absolute",inset:0,width:totalW,height:maxColH+4,overflow:"visible",pointerEvents:"none"}}>
          {edges.map((e,i)=><path key={i} d={`M ${e.x1} ${e.y1} C ${e.mx} ${e.y1}, ${e.mx} ${e.y2}, ${e.x2} ${e.y2}`} fill="none" stroke={e.color} strokeWidth={1.5} strokeOpacity={e.pending?0.2:0.45} strokeDasharray={e.pending?"5 3":"none"}/>)}
        </svg>
        {steps.map(step=>{
          const pos=np[step.stepId]; if(!pos)return null;
          const cfg=S_CFG[step.status]||S_CFG.PENDING;
          const isSel=selectedStep?.stepId===step.stepId;
          return (
            <div key={step.stepId} onClick={()=>onSelectStep(isSel?null:step)} style={{
              position:"absolute",left:pos.x,top:pos.y,width:NW,height:NH,
              background:isSel?"#eff6ff":"#fff",
              border:`1.5px solid ${isSel?"#3b82f6":cfg.border}`,
              borderRadius:8,padding:"9px 11px",cursor:"pointer",boxSizing:"border-box",transition:"all .15s",
              boxShadow:isSel?"0 0 0 3px rgba(59,130,246,0.15)":step.status==="FAILED"?"0 0 0 2px rgba(220,38,38,0.12)":"0 1px 3px rgba(15,23,42,0.06)",
            }}>
              <div style={{fontSize:11,fontWeight:600,color:"#0f172a",marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{step.name}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <ExecChip executor={step.executor}/>
                <StatusChip status={step.status} small/>
              </div>
              {step.status==="RUNNING"&&<div style={{marginTop:5,height:2,background:"#e2e8f0",borderRadius:1,overflow:"hidden"}}><div style={{height:"100%",width:"35%",background:"#d97706",animation:"progress-slide 1.8s ease-in-out infinite"}}/></div>}
              {step.status==="SUCCEEDED"&&step.durationSeconds&&<div style={{marginTop:3,fontSize:9,color:"#94a3b8",fontFamily:"'DM Mono',monospace"}}>✓ {fmtDuration(step.durationSeconds)}</div>}
              {step.status==="FAILED"&&<div style={{marginTop:3,fontSize:9,color:"#dc2626",fontFamily:"'DM Mono',monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>✗ {step.errorCode||"FAILED"}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const write=canWrite(role,env);
  const isProd=env==="PROD";

  const doAction=action=>{
    if(confirm===action){setDone(action);setConfirm(null);setTimeout(()=>setDone(null),3000);}
    else{setConfirm(action);setTimeout(()=>setConfirm(null),3500);}
  };

  const rows=[
    {l:"Step ID",v:step.stepId},{l:"Job ID",v:step.jobId||"—"},
    {l:"Executor",v:<ExecChip executor={step.executor}/>},
    {l:"Status",v:<StatusChip status={step.status}/>},
    {l:"Start",v:step.startTime||"—"},{l:"End",v:step.endTime||"—"},
    {l:"Duration",v:fmtDuration(step.durationSeconds)},
    {l:"Retries",v:step.retryAttempts??0},
    {l:"Row Count",v:fmtRows(step.rowCount)},{l:"Bytes Out",v:fmtBytes(step.bytesWritten)},

          ):(
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>doAction("kill")} style={{flex:1,padding:"7px 0",borderRadius:6,fontSize:11,fontWeight:700,background:confirm==="kill"?"#dc2626":"#fff",border:`1.5px solid ${confirm==="kill"?"#dc2626":"#fecaca"}`,color:confirm==="kill"?"#fff":"#dc2626"}}>{confirm==="kill"?"Confirm?":"Force Kill"}</button>
              <button onClick={()=>doAction("retry")} style={{flex:1,padding:"7px 0",borderRadius:6,fontSize:11,fontWeight:700,background:confirm==="retry"?"#d97706":"#fff",border:`1.5px solid ${confirm==="retry"?"#d97706":"#fde68a"}`,color:confirm==="retry"?"#fff":"#d97706"}}>{confirm==="retry"?"Confirm?":"Retry Step"}</button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── REPORTS VIEW ──────────────────────────────────────────────────────────────
function ReportsView({ followed, onToggle }) {
  const [catFilter,setCatFilter]=useState("All");
  const [showAll,setShowAll]=useState(false);
  const cats=["All",...Array.from(new Set(REPORTS.map(r=>r.category)))];
  const pipMap={}; PIPELINES.forEach(p=>pipMap[p.id]=p);

  const visible=REPORTS.filter(r=>{
    if(catFilter!=="All"&&r.category!==catFilter)return false;
    if(!showAll&&followed.size>0)return followed.has(r.id);
    return true;
  });

  return (
    <div style={{maxWidth:900}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,color:"#0f172a"}}>Reports</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>
            {followed.size>0?`${followed.size} followed · `:"All "}{REPORTS.length} reports across all pipelines
          </div>
        </div>
        <button onClick={()=>setShowAll(v=>!v)} style={{padding:"6px 14px",borderRadius:7,fontSize:12,fontWeight:600,background:showAll?"#0f172a":"#fff",color:showAll?"#fff":"#0f172a",border:"1.5px solid "+(showAll?"#0f172a":"#e2e8f0")}}>
          {showAll?"★ My Reports":"⊞ All Reports"}
        </button>
      </div>

      {followed.size===0&&!showAll&&(
        <div style={{background:"#f8fafc",border:"2px dashed #e2e8f0",borderRadius:10,padding:"32px 24px",textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:28,marginBottom:10}}>📋</div>
          <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:5}}>No followed reports yet</div>
          <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>Follow reports to get a personalised view of the outputs you care about.</div>
          <button onClick={()=>setShowAll(true)} style={{padding:"8px 20px",borderRadius:7,background:"#4338ca",color:"#fff",border:"none",fontSize:13,fontWeight:600}}>Browse All Reports</button>
        </div>
      )}

      {/* Category filter */}
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setCatFilter(c)} style={{padding:"4px 12px",borderRadius:6,border:`1.5px solid ${catFilter===c?"#4338ca":"#e2e8f0"}`,background:catFilter===c?"#eff6ff":"#fff",color:catFilter===c?"#4338ca":"#64748b",fontSize:11,fontWeight:600}}>{c}</button>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {visible.map(r=>{
          const pip=pipMap[r.pipeline];
          const isFol=followed.has(r.id);
          return (
            <div key={r.id} style={{background:"#fff",border:`1.5px solid ${isFol?"#c7d2fe":"#e2e8f0"}`,borderRadius:9,padding:"14px 16px",boxShadow:isFol?"0 0 0 3px rgba(67,56,202,0.07)":"0 1px 3px rgba(15,23,42,0.04)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{r.name}</span>
                    <span style={{fontSize:9,color:"#94a3b8",background:"#f1f5f9",padding:"1px 6px",borderRadius:3,fontFamily:"'DM Mono',monospace"}}>{r.category}</span>
                    <RptChip status={r.status}/>
                    {isFol&&<span style={{fontSize:10,color:"#4338ca",fontWeight:600}}>★ Following</span>}
                  </div>
                  <div style={{fontSize:12,color:"#64748b",marginBottom:9,lineHeight:1.5}}>{r.description}</div>
                  <div style={{display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:10,color:"#94a3b8"}}>📦 <span style={{color:"#475569",fontFamily:"'DM Mono',monospace",fontSize:9}}>{r.pipeline}</span></span>
                    <span style={{fontSize:10,color:"#94a3b8"}}>⤷ <span style={{color:"#475569",fontFamily:"'DM Mono',monospace",fontSize:9}}>{r.step}</span></span>
                    <span style={{fontSize:10,color:"#94a3b8"}}>🕐 {r.lastGenerated}</span>
                    {pip&&<div style={{display:"flex",gap:5,alignItems:"center"}}><StatusChip status={pip.lastRun.status} small/><SlaChip status={pip.slaStatus}/></div>}
                  </div>
                </div>
                <button onClick={()=>onToggle(r.id)} style={{flexShrink:0,padding:"6px 12px",borderRadius:7,fontSize:11,fontWeight:700,background:isFol?"#4338ca":"#f8fafc",color:isFol?"#fff":"#64748b",border:`1.5px solid ${isFol?"#4338ca":"#e2e8f0"}`}}>
                  {isFol?"★ Following":"☆ Follow"}
                </button>
              </div>
              {pip&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                  <span style={{fontSize:10,color:"#94a3b8"}}>Pipeline</span>
                  <div style={{flex:1,minWidth:80}}><StepBar steps={pip.steps}/></div>
                  <span style={{fontSize:10,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>{pip.steps.complete}/{Object.values(pip.steps).reduce((a,b)=>a+b,0)} steps</span>
                  <span style={{fontSize:10,color:"#94a3b8"}}>SLA {pip.slaDeadline}</span>
                  {pip.estimatedCompletion&&<span style={{fontSize:10,color:"#64748b"}}>Est. {pip.estimatedCompletion}</span>}
                </div>
              )}
            </div>
          );
        })}
        {visible.length===0&&(
          <div style={{textAlign:"center",padding:"32px",color:"#94a3b8",fontSize:13}}>No reports match current filter.</div>
        )}
      </div>
    </div>
  );
}

// ── PIPELINES VIEW ────────────────────────────────────────────────────────────
function PipelinesView({ role, env, followed }) {
  const [selPip,setSelPip]=useState(PIPELINES[0]);
  const [selStep,setSelStep]=useState(null);
  const [view,setView]=useState("DAG");
  const [execFilter,setExecFilter]=useState(null);
  const [triggerPip,setTriggerPip]=useState(null);
  const [triggered,setTriggered]=useState(new Set());
  const write=canWrite(role,env);
  const run=RUN_DETAILS[selPip?.id];
  const allSteps=run?.steps||[];
  const filtered=execFilter?allSteps.filter(s=>s.executor===execFilter):allSteps;
  const selectPip=p=>{setSelPip(p);setSelStep(null);setExecFilter(null);};
  const linkedRpts=REPORTS.filter(r=>r.pipeline===selPip?.id&&followed.has(r.id));

  return (
    <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
      {triggerPip&&<TriggerModal pipeline={triggerPip} env={env} onClose={()=>setTriggerPip(null)} onConfirm={()=>setTriggered(s=>new Set([...s,triggerPip.id]))}/>}

      {/* Sidebar */}
      <div style={{width:284,flexShrink:0,borderRight:"1px solid #e2e8f0",background:"#fff",padding:"14px 10px",display:"flex",flexDirection:"column",gap:10,overflowY:"auto"}}>
        <div>
          <div style={{fontSize:9,color:"#94a3b8",letterSpacing:"0.12em",fontWeight:700,marginBottom:7}}>SLA SUMMARY · EOD</div>
          <SlaSummaryStrip pipelines={PIPELINES}/>
        </div>
        <div style={{height:1,background:"#f1f5f9"}}/>
        <div>
          <div style={{fontSize:9,color:"#94a3b8",letterSpacing:"0.12em",fontWeight:700,marginBottom:7}}>PIPELINES · {PIPELINES.length}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {PIPELINES.map(p=><PipelineCard key={p.id} pipeline={p} selected={selPip?.id===p.id} onClick={()=>selectPip(p)} role={role} env={env} onTrigger={pip=>setTriggerPip(pip)}/>)}
          </div>
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,padding:"18px 20px",display:"flex",flexDirection:"column",gap:13,overflowY:"auto"}}>
        {selPip&&run&&(
          <>
            {/* Run header */}
            <div style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:10,padding:"15px 18px",boxShadow:"0 1px 4px rgba(15,23,42,0.05)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,marginBottom:10}}>
                <div>
                  <div style={{fontSize:17,fontWeight:700,color:"#0f172a",marginBottom:5}}>{selPip.name}</div>
                  <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                    <StatusChip status={selPip.lastRun.status}/>
                    <SlaChip status={selPip.slaStatus}/>
                    {role!=="BUSINESS"&&<><span style={{fontSize:10,color:"#94a3b8",fontFamily:"'DM Mono',monospace"}}>{run.runId}</span><span style={{fontSize:10,color:"#94a3b8",fontFamily:"'DM Mono',monospace"}}>git:{run.gitSha}</span></>}
                    {triggered.has(selPip.id)&&<span style={{fontSize:10,color:"#16a34a",fontFamily:"'DM Mono',monospace"}}>⚡ Manual trigger queued</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-end"}}>
                  {[{label:"START",value:selPip.lastRun.startTime},{label:"SLA",value:selPip.slaDeadline},{label:"EST DONE",value:selPip.estimatedCompletion||"—"},{label:"TRIGGER",value:run.triggerType}].map(({label,value})=>(
                    <div key={label} style={{textAlign:"center"}}>
                      <div style={{fontSize:8,color:"#94a3b8",letterSpacing:"0.1em",marginBottom:3}}>{label}</div>
                      <div style={{fontSize:12,color:"#0f172a",fontFamily:"'DM Mono',monospace"}}>{value}</div>
                    </div>
                  ))}
                  {write&&role!=="BUSINESS"&&(
                    <button onClick={()=>setTriggerPip(selPip)} style={{padding:"6px 16px",borderRadius:7,border:"none",background:"#4338ca",color:"#fff",fontSize:12,fontWeight:700}}>▶ Trigger</button>
                  )}
                </div>
              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:10,color:"#64748b"}}>{selPip.steps.complete}/{Object.values(selPip.steps).reduce((a,b)=>a+b,0)} steps complete</span>
                  {selPip.slaStatus==="ON_TRACK"&&selPip.bufferMinutes>0&&<span style={{fontSize:10,color:"#16a34a"}}>+{selPip.bufferMinutes}m buffer</span>}
                  {selPip.slaStatus==="BREACHED"&&<span style={{fontSize:10,color:"#dc2626"}}>SLA breached by {Math.abs(selPip.bufferMinutes)}m</span>}
                  {selPip.slaStatus==="AT_RISK"&&<span style={{fontSize:10,color:"#d97706"}}>{selPip.bufferMinutes}m buffer remaining</span>}
                </div>
                <StepBar steps={selPip.steps}/>
              </div>
            </div>

            {/* Linked reports banner */}
            {linkedRpts.length>0&&(
              <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:8,padding:"10px 14px"}}>
                <div style={{fontSize:10,color:"#2563eb",fontWeight:700,marginBottom:7}}>📋 {linkedRpts.length} followed report{linkedRpts.length>1?"s":""} depend on this pipeline</div>
                <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                  {linkedRpts.map(r=>(
                    <div key={r.id} style={{display:"flex",alignItems:"center",gap:6,background:"#fff",border:"1px solid #bfdbfe",borderRadius:5,padding:"4px 10px"}}>
                      <RptChip status={r.status}/>
                      <span style={{fontSize:11,color:"#1e3a5f",fontWeight:500}}>{r.name}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Controls */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:"#94a3b8"}}>EXECUTOR</span>
                {[null,"QRM","DATABRICKS","AUTOSYS"].map(e=>{
                  const ec=e?EXEC_CFG[e]:null;
                  const isAct=execFilter===e;
                  return(<button key={e||"ALL"} onClick={()=>setExecFilter(e)} style={{padding:"4px 10px",borderRadius:5,fontSize:10,fontWeight:600,background:isAct?(ec?ec.bg:"#e2e8f0"):"#fff",color:isAct?(ec?ec.color:"#0f172a"):"#64748b",border:`1.5px solid ${isAct?(ec?ec.border:"#94a3b8"):"#e2e8f0"}`}}>{e||"ALL"}</button>);
                })}
              </div>
              <div style={{display:"flex",background:"#f1f5f9",borderRadius:6,padding:2,gap:1}}>
                {[["DAG","⬡ Flow"],["LIST","≡ List"]].map(([v,lbl])=>(
                  <button key={v} onClick={()=>setView(v)} style={{padding:"4px 12px",borderRadius:4,fontSize:10,fontWeight:700,background:view===v?"#fff":"transparent",color:view===v?"#0f172a":"#94a3b8",border:view===v?"1px solid #e2e8f0":"none",boxShadow:view===v?"0 1px 3px rgba(15,23,42,0.06)":"none"}}>{lbl}</button>
                ))}
              </div>
            </div>

            {/* Flow + detail */}
            <div style={{display:"grid",gridTemplateColumns:selStep?"1fr 300px":"1fr",gap:13,alignItems:"start"}}>
              <div style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:10,padding:"16px 18px",boxShadow:"0 1px 4px rgba(15,23,42,0.04)"}}>
                <div style={{fontSize:9,color:"#94a3b8",letterSpacing:"0.1em",fontWeight:700,marginBottom:13}}>
                  {view==="DAG"?"JOB DEPENDENCY FLOW":"STEP SEQUENCE"}
                  {execFilter&&<span style={{color:EXEC_CFG[execFilter]?.color}}> · {execFilter} ONLY</span>}
                </div>
                {view==="DAG"?<DagFlowView steps={filtered} onSelectStep={setSelStep} selectedStep={selStep}/>:<StepListView steps={filtered} onSelect={setSelStep} selected={selStep} role={role}/>}
              </div>
              {selStep&&<StepDetailPanel step={selStep} onClose={()=>setSelStep(null)} role={role} env={env}/>}
            </div>

            {/* Audit */}
            {(role==="L3"||role==="PROD_SUPPORT")&&(
              <div style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"10px 16px",display:"flex",gap:20,alignItems:"center",flexWrap:"wrap",boxShadow:"0 1px 3px rgba(15,23,42,0.04)"}}>
                <span style={{fontSize:9,color:"#94a3b8",fontWeight:700,letterSpacing:"0.1em"}}>AUDIT</span>
                {[{l:"Triggered By",v:run.triggeredBy},{l:"Type",v:run.triggerType},{l:"Git SHA",v:run.gitSha},{l:"Biz Date",v:run.businessDate},{l:"Run ID",v:run.runId}].map(({l,v})=>(
                  <div key={l}><div style={{fontSize:8,color:"#94a3b8",letterSpacing:"0.08em"}}>{l}</div><div style={{fontSize:11,color:"#0f172a",fontFamily:"'DM Mono',monospace"}}>{v}</div></div>
                ))}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [env,setEnv]=useState("PROD");
  const [role,setRole]=useState("PROD_SUPPORT");
  const [tab,setTab]=useState("PIPELINES");
  const [clock,setClock]=useState(nowStr());
  const [followed,setFollowed]=useState(new Set(["rpt.ftp.daily_interest","rpt.ftp.transfer_pricing","rpt.ftp.funds_cost"]));
  useEffect(()=>{const t=setInterval(()=>setClock(nowStr()),1000);return()=>clearInterval(t);},[]);
  const toggleFollow=id=>setFollowed(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const ec=ENVS[env];
  const write=canWrite(role,env);

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#f1f5f9",minHeight:"100vh",display:"flex",flexDirection:"column",height:"100vh"}}>

      {/* ENV BANNER */}
      <div style={{background:ec.bg,borderBottom:`2px solid ${ec.border}`,padding:"5px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:11,fontWeight:800,letterSpacing:"0.1em",color:ec.color,fontFamily:"'DM Mono',monospace",background:"white",padding:"2px 8px",borderRadius:3,border:`1px solid ${ec.border}`}}>{env}</span>
          <span style={{fontSize:11,color:ec.color}}>{ec.text}</span>
          {env==="PROD"&&role==="L3"&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700,background:"#fff1f2",padding:"1px 7px",borderRadius:3,border:"1px solid #fecaca"}}>⚠ Write access restricted for L3 in PROD</span>}
          {env==="PROD"&&role==="PROD_SUPPORT"&&<span style={{fontSize:10,color:"#16a34a",fontWeight:700}}>✓ Prod Support has write access in PROD</span>}
        </div>
        <div style={{display:"flex",gap:4}}>
          {Object.entries(ENVS).map(([key,cfg])=>(
            <button key={key} onClick={()=>setEnv(key)} style={{padding:"2px 9px",borderRadius:4,fontSize:10,fontWeight:800,letterSpacing:"0.07em",fontFamily:"'DM Mono',monospace",background:env===key?cfg.color:"transparent",color:env===key?"#fff":cfg.color,border:`1.5px solid ${env===key?cfg.color:cfg.border}`}}>{key}</button>
          ))}
        </div>
      </div>

      {/* NAV */}
      <div style={{borderBottom:"1px solid #e2e8f0",background:"#fff",padding:"0 22px",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 4px rgba(15,23,42,0.05)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#4338ca 0%,#7c3aed 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:"#fff",flexShrink:0}}>Q</div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#0f172a",letterSpacing:"-0.01em"}}>QRM Orchestration Monitor</div>
                <div style={{fontSize:9,color:"#94a3b8",fontFamily:"'DM Mono',monospace",letterSpacing:"0.08em"}}>TREASURY TECHNOLOGY</div>
              </div>
            </div>
            <div style={{width:1,height:28,background:"#e2e8f0"}}/>
            <div style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace"}}>BIZ DATE <span style={{color:"#0f172a"}}>2026-04-14</span></div>
            <div style={{display:"flex",gap:1}}>
              {[{key:"PIPELINES",label:"Pipelines"},{key:"REPORTS",label:`Reports${followed.size>0?` (${followed.size})`:""}` }].map(({key,label})=>(
                <button key={key} onClick={()=>setTab(key)} style={{padding:"6px 14px",borderRadius:6,fontSize:12,fontWeight:600,background:tab===key?"#f1f5f9":"transparent",color:tab===key?"#0f172a":"#64748b",border:"none"}}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {/* Role */}
            <div style={{display:"flex",background:"#f1f5f9",borderRadius:7,padding:2,gap:1}}>
              {[{k:"BUSINESS",l:"Business"},{k:"PROD_SUPPORT",l:"Prod Support"},{k:"L3",l:"L3"}].map(r=>(
                <button key={r.k} onClick={()=>setRole(r.k)} style={{padding:"4px 11px",borderRadius:5,border:"none",fontSize:11,fontWeight:600,background:role===r.k?"#fff":"transparent",color:role===r.k?"#0f172a":"#94a3b8",boxShadow:role===r.k?"0 1px 3px rgba(15,23,42,0.08)":"none"}}>{r.l}</button>
              ))}
            </div>
            {/* Permission pill */}
            {role!=="BUSINESS"&&(
              <div style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600,background:write?"#f0fdf4":"#fff1f2",color:write?"#16a34a":"#dc2626",border:`1px solid ${write?"#bbf7d0":"#fecaca"}`}}>
                {write?"🔓 Read + Write":"🔒 Read Only"}
              </div>
            )}
            {/* Clock */}
            <div style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:"#64748b",padding:"3px 9px",border:"1px solid #e2e8f0",borderRadius:5,background:"#f8fafc"}}>{clock}</div>
            {/* Live */}
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#16a34a",animation:"pulse-dot 2s ease-in-out infinite",display:"inline-block"}}/>
              <span style={{fontSize:10,color:"#64748b"}}>LIVE</span>
            </div>
          </div>
        </div>
      </div>

      {/* BODY */}
      {tab==="PIPELINES"
        ?<PipelinesView role={role} env={env} followed={followed}/>
        :<div style={{flex:1,padding:"20px 24px",overflowY:"auto"}}><ReportsView followed={followed} onToggle={toggleFollow}/></div>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
